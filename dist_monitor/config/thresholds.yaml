dist_monitor:
  ros__parameters:
    window_duration_sec: 5.0
    update_frequency_hz: 10.0
    kl_threshold_mean: 0.15
    w1_threshold_mean: 0.08
    mmd_threshold: 0.05
    mmd_p_value_alpha: 0.05
    mmd_permutation_count: 50
    mmd_max_samples: 100
    mmd_gamma: 0.0
    use_kl: true
    use_w1: true
    use_mmd: true
    min_samples: 50
    align_tolerance_sec: 0.02
    baseline_duration_sec: 30.0
    real_source: topic
    lerobot_dataset_path: ''
    comm_health:
      expected_sim_hz: 100.0
      expected_real_hz: 100.0
      ewma_alpha: 0.2
      gap_multiplier: 2.0
      latency_threshold_ms: 100.0
      max_samples: 100
    robot_profile: iiwa7
    soft_limit_proximity_ratio: 0.95
    dynamics_anomaly:
      velocity_jump_threshold: 2.0
      error_spike_sigma: 3.0
