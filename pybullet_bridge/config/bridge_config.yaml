pybullet_bridge:
  ros__parameters:
    urdf_path: ""
    robot_profile: iiwa7
    sim_mode: "DIRECT"
    physics_frequency: 240.0
    publish_frequency: 100.0
    enable_dual_source: true
    random_seed: 42
    randomization_strength: 1.0
    watchdog_timeout_ms: 5000
    joint_damping_base: 0.04
    joint_friction_base: 0.1
    joint_damping_range: [0.0, 0.5]
    joint_friction_range: [0.0, 0.3]
    motor_strength_range: [0.85, 1.15]
    time_delay_range_ms: [0.0, 50.0]
    payload_mass_range: [0.0, 0.5]
    enable_camera: true
    camera_fps: 12.0
    camera_width: 640
    camera_height: 480
